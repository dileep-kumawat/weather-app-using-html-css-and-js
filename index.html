<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Inter", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e2a47, #3b4d72);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            font-weight: 700;
        }

        /* Search box */
        #search {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 25px;
        }

        #search input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 12px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            color: #fff;
            font-size: 1rem;
            transition: 0.3s;
        }

        #search input::placeholder {
            color: #d4d4d4;
        }

        #search input:focus {
            background: rgba(255, 255, 255, 0.25);
        }

        #search button {
            padding: 14px 22px;
            border-radius: 12px;
            background: #00c3ff;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: 0.3s;
        }

        #search button:hover {
            background: #009ed1;
        }

        /* Weather Icon */
        #weather-icon img {
            width: 160px;
            margin: 20px 0;
            filter: drop-shadow(0px 4px 12px rgba(0, 0, 0, 0.5));
        }

        /* Weather card */
        #weather {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(14px);
            padding: 25px;
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            margin-top: 10px;
            transition: 0.3s ease-in-out;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
        }

        #weather h1 {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 15px;
            text-transform: capitalize;
        }

        #weather p {
            margin: 5px 0;
            font-size: 1.1rem;
        }

        #weather span {
            font-weight: 600;
        }

        #recommendedCities {
            width: 100%;
            max-width: 800px;
            margin-top: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }

        .city {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            padding: 15px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .city:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.25);
        }

        .city h1 {
            font-size: 1.2rem;
            margin-bottom: 4px;
        }

        .city h2 {
            font-size: 0.9rem;
            font-weight: 300;
            opacity: 0.8;
        }

        #wrap{
            display: flex;
            width: 100%;
            justify-content: center;
            gap: 5rem;
            align-items: center;
            flex-direction: row-reverse;
            margin: 5rem 0;
        }

        @media (max-width:900px) {
            #search{
                flex-direction: column;
            }
            #wrap{
                flex-direction: column;
                gap: 1rem;
                margin: 0;
                margin-bottom: 1rem;
            }
        }
    </style>
</head>

<body>
    <h1>Weather App</h1>

    <div id="search">
        <input type="text" placeholder="Enter your city...">
        <button id="weatherBtn">See Weather</button>
    </div>

    <div id="wrap">
        <div id="weather-icon">
            <img src="./Images/unknown.png" alt="">
        </div>
        <div id="weather"></div>
    </div>

    <h1>Recommended Cities</h1>
    <div id="recommendedCities">
    </div>

    <script src="script.js"></script>
</body>

</html>
